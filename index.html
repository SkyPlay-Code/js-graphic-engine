<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Next-Gen JS Engine - PBR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: white; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>ENGINE v2.1: PBR PIPELINE</h2>
        <p>X-Axis (Left to Right) : Metallic 0.0 -> 1.0</p>
        <p>Y-Axis (Top to Bottom) : Roughness 0.1 -> 1.0</p>
        <p>FPS: <span id="fps">0</span></p>
    </div>
    <canvas id="screen"></canvas>

    <script>
        // ==========================================
        // 1. MATH LIBRARY (Unchanged)
        // ==========================================
        const Mat4 = {
            create: () => new Float32Array(16).fill(0).map((_, i) => i % 5 === 0 ? 1 : 0),
            perspective: (out, fovy, aspect, near, far) => {
                let f = 1.0 / Math.tan(fovy / 2), nf = 1 / (near - far);
                out.fill(0); out[0] = f / aspect; out[5] = f;
                out[10] = (far + near) * nf; out[11] = -1; out[14] = (2 * far * near) * nf;
                return out;
            },
            lookAt: (out, eye, center, up) => {
                let z0 = eye[0]-center[0], z1 = eye[1]-center[1], z2 = eye[2]-center[2];
                let len = 1 / Math.hypot(z0, z1, z2); z0 *= len; z1 *= len; z2 *= len;
                let x0 = up[1]*z2 - up[2]*z1, x1 = up[2]*z0 - up[0]*z2, x2 = up[0]*z1 - up[1]*z0;
                len = 1 / Math.hypot(x0, x1, x2); x0 *= len; x1 *= len; x2 *= len;
                let y0 = z1*x2 - z2*x1, y1 = z2*x0 - z0*x2, y2 = z0*x1 - z1*x0;
                out[0] = x0; out[1] = y0; out[2] = z0; out[3] = 0;
                out[4] = x1; out[5] = y1; out[6] = z1; out[7] = 0;
                out[8] = x2; out[9] = y2; out[10] = z2; out[11] = 0;
                out[12] = -(x0*eye[0] + x1*eye[1] + x2*eye[2]);
                out[13] = -(y0*eye[0] + y1*eye[1] + y2*eye[2]);
                out[14] = -(z0*eye[0] + z1*eye[1] + z2*eye[2]); out[15] = 1;
                return out;
            },
            fromRotationTranslationScale: (out, q, v, s) => {
                let x2 = q[0] + q[0], y2 = q[1] + q[1], z2 = q[2] + q[2];
                let xx = q[0] * x2, xy = q[0] * y2, xz = q[0] * z2;
                let yy = q[1] * y2, yz = q[1] * z2, zz = q[2] * z2;
                let wx = q[3] * x2, wy = q[3] * y2, wz = q[3] * z2;
                out[0] = (1 - (yy + zz)) * s[0]; out[1] = (xy + wz) * s[0]; out[2] = (xz - wy) * s[0]; out[3] = 0;
                out[4] = (xy - wz) * s[1]; out[5] = (1 - (xx + zz)) * s[1]; out[6] = (yz + wx) * s[1]; out[7] = 0;
                out[8] = (xz + wy) * s[2]; out[9] = (yz - wx) * s[2]; out[10] = (1 - (xx + yy)) * s[2]; out[11] = 0;
                out[12] = v[0]; out[13] = v[1]; out[14] = v[2]; out[15] = 1;
                return out;
            }
        };
    
        // ==========================================
        // 2. ECS CORE
        // ==========================================
        class World {
            constructor() { this.entities = 0; this.components = {}; }
            createEntity() { return ++this.entities; }
            addComponent(entity, name, data) {
                if (!this.components[name]) this.components[name] = {};
                this.components[name][entity] = data;
            }
            getComponent(entity, name) { return this.components[name] ? this.components[name][entity] : null; }
            query(...names) {
                if (!this.components[names[0]]) return[];
                let match = Object.keys(this.components[names[0]]);
                for (let i = 1; i < names.length; i++) {
                    match = match.filter(e => this.components[names[i]] && this.components[names[i]][e] !== undefined);
                }
                return match;
            }
        }
        const engine = new World();
    
        function Transform(x=0, y=0, z=0) { return { position: [x, y, z], rotation:[0, 0, 0, 1], scale: [1, 1, 1], matrix: Mat4.create() }; }
        function Mesh(vertices, normals, indices) { return { vertices, normals, indices, vao: null, ready: false }; }
        function Material(r, g, b, metallic, roughness) { return { albedo:[r, g, b], metallic, roughness }; }
    
        // ==========================================
        // 3. WEBGL2 & SHADER PIPELINES
        // ==========================================
        const canvas = document.getElementById('screen');
        const gl = canvas.getContext('webgl2', { antialias: false }); // Antialias off for FBO Post-Process
    
        // Enable floating point textures for true HDR (High Dynamic Range)
        const extColorBufferFloat = gl.getExtension("EXT_color_buffer_float");
    
        // --- SHADER 1: PBR MAIN SCENE ---
        const vsSource = `#version 300 es
            layout(location = 0) in vec3 a_position; layout(location = 1) in vec3 a_normal;
            uniform mat4 u_model; uniform mat4 u_view; uniform mat4 u_projection;
            out vec3 v_worldPos; out vec3 v_normal;
            void main() {
                vec4 worldPos = u_model * vec4(a_position, 1.0);
                v_worldPos = worldPos.xyz;
                v_normal = mat3(u_model) * a_normal; 
                gl_Position = u_projection * u_view * worldPos;
            }`;
    
        const fsSource = `#version 300 es
            precision highp float;
            in vec3 v_worldPos; in vec3 v_normal;
            out vec4 outColor;
    
            uniform vec3 u_camPos; uniform vec3 u_albedo;
            uniform float u_metallic; uniform float u_roughness;
            uniform vec3 u_lightPos; // Now dynamic!
    
            const float PI = 3.14159265359;
            const vec3 lightColor = vec3(350.0, 350.0, 350.0); // Bright HDR Light
    
            float DistributionGGX(vec3 N, vec3 H, float roughness) {
                float a = roughness * roughness; float a2 = a * a;
                float NdotH = max(dot(N, H), 0.0); float NdotH2 = NdotH * NdotH;
                float num = a2; float denom = (NdotH2 * (a2 - 1.0) + 1.0);
                denom = PI * denom * denom; return num / max(denom, 0.0000001);
            }
            float GeometrySchlickGGX(float NdotV, float roughness) {
                float r = (roughness + 1.0); float k = (r * r) / 8.0;
                return NdotV / (NdotV * (1.0 - k) + k);
            }
            float GeometrySmith(vec3 N, vec3 V, vec3 L, float roughness) {
                float NdotV = max(dot(N, V), 0.0); float NdotL = max(dot(N, L), 0.0);
                return GeometrySchlickGGX(NdotL, roughness) * GeometrySchlickGGX(NdotV, roughness);
            }
            vec3 fresnelSchlick(float cosTheta, vec3 F0) {
                return F0 + (1.0 - F0) * pow(clamp(1.0 - cosTheta, 0.0, 1.0), 5.0);
            }
    
            void main() {
                vec3 N = normalize(v_normal); vec3 V = normalize(u_camPos - v_worldPos);
                vec3 F0 = mix(vec3(0.04), u_albedo, u_metallic);
    
                vec3 L = normalize(u_lightPos - v_worldPos); vec3 H = normalize(V + L);
                float distance = length(u_lightPos - v_worldPos);
                float attenuation = 1.0 / (distance * distance);
                vec3 radiance = lightColor * attenuation;
    
                float NDF = DistributionGGX(N, H, u_roughness);   
                float G   = GeometrySmith(N, V, L, u_roughness);      
                vec3 F    = fresnelSchlick(max(dot(H, V), 0.0), F0);       
    
                vec3 specular = (NDF * G * F) / (4.0 * max(dot(N, V), 0.0) * max(dot(N, L), 0.0) + 0.0001);
                vec3 kS = F; vec3 kD = vec3(1.0) - kS; kD *= 1.0 - u_metallic;	  
    
                float NdotL = max(dot(N, L), 0.0);        
                vec3 Lo = (kD * u_albedo / PI + specular) * radiance * NdotL;
                vec3 ambient = vec3(0.05) * u_albedo; // Boosted ambient slightly
    
                // Output LINEAR HDR COLOR to the Framebuffer (Tone mapping removed from here)
                outColor = vec4(ambient + Lo, 1.0);
            }`;
    
        // --- SHADER 2: POST-PROCESSING ---
        const vsPost = `#version 300 es
            layout(location = 0) in vec2 a_pos;
            out vec2 v_texCoord;
            void main() {
                gl_Position = vec4(a_pos, 0.0, 1.0);
                v_texCoord = a_pos * 0.5 + 0.5;
            }`;
    
        const fsPost = `#version 300 es
            precision highp float;
            in vec2 v_texCoord;
            uniform sampler2D u_screenTexture;
            uniform float u_time;
            out vec4 outColor;
    
            // ACES Film Tone Mapping (Industry Standard)
            vec3 ACESFilm(vec3 x) {
                float a = 2.51; float b = 0.03; float c = 2.43; float d = 0.59; float e = 0.14;
                return clamp((x*(a*x+b))/(x*(c*x+d)+e), 0.0, 1.0);
            }
    
            void main() {
                // 1. Chromatic Aberration (Sample colors at slight offsets)
                float offset = 0.004;
                float r = texture(u_screenTexture, vec2(v_texCoord.x + offset, v_texCoord.y)).r;
                float g = texture(u_screenTexture, v_texCoord).g;
                float b = texture(u_screenTexture, vec2(v_texCoord.x - offset, v_texCoord.y)).b;
                vec3 color = vec3(r, g, b);
    
                // 2. Tone Mapping (Convert HDR -> SDR)
                color = ACESFilm(color);
    
                // 3. Gamma Correction
                color = pow(color, vec3(1.0/2.2));
    
                // 4. Vignette
                vec2 uv = v_texCoord * 2.0 - 1.0;
                float dist = dot(uv, uv);
                color *= 1.0 - dist * 0.25;
    
                // 5. Film Grain
                float noise = fract(sin(dot(v_texCoord * u_time, vec2(12.9898, 78.233))) * 43758.5453);
                color -= noise * 0.04;
    
                outColor = vec4(color, 1.0);
            }`;
    
        function compile(type, src) {
            const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
            return s;
        }
    
        const pbrProgram = gl.createProgram();
        gl.attachShader(pbrProgram, compile(gl.VERTEX_SHADER, vsSource));
        gl.attachShader(pbrProgram, compile(gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(pbrProgram);
    
        const postProgram = gl.createProgram();
        gl.attachShader(postProgram, compile(gl.VERTEX_SHADER, vsPost));
        gl.attachShader(postProgram, compile(gl.FRAGMENT_SHADER, fsPost));
        gl.linkProgram(postProgram);
    
        // PBR Uniforms
        const locs = {
            model: gl.getUniformLocation(pbrProgram, "u_model"),
            view: gl.getUniformLocation(pbrProgram, "u_view"),
            proj: gl.getUniformLocation(pbrProgram, "u_projection"),
            camPos: gl.getUniformLocation(pbrProgram, "u_camPos"),
            albedo: gl.getUniformLocation(pbrProgram, "u_albedo"),
            metallic: gl.getUniformLocation(pbrProgram, "u_metallic"),
            roughness: gl.getUniformLocation(pbrProgram, "u_roughness"),
            lightPos: gl.getUniformLocation(pbrProgram, "u_lightPos")
        };
    
        // Post-Process Uniforms
        const postLocs = {
            screenTex: gl.getUniformLocation(postProgram, "u_screenTexture"),
            time: gl.getUniformLocation(postProgram, "u_time")
        };
    
        // ==========================================
        // 4. RENDER TARGET (FBO) SETUP
        // ==========================================
        let targetFBO = null;
        let targetTexture = null;
        let depthBuffer = null;
    
        function setupFBO(w, h) {
            if (targetFBO) { gl.deleteFramebuffer(targetFBO); gl.deleteTexture(targetTexture); gl.deleteRenderbuffer(depthBuffer); }
        
            targetFBO = gl.createFramebuffer();
            gl.bindFramebuffer(gl.FRAMEBUFFER, targetFBO);
        
            // Create High-Precision Texture (RGBA16F if supported, else RGBA8)
            targetTexture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, targetTexture);
            const internalFmt = extColorBufferFloat ? gl.RGBA16F : gl.RGBA8;
            const type = extColorBufferFloat ? gl.HALF_FLOAT : gl.UNSIGNED_BYTE;
        
            gl.texImage2D(gl.TEXTURE_2D, 0, internalFmt, w, h, 0, gl.RGBA, type, null);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, targetTexture, 0);
        
            depthBuffer = gl.createRenderbuffer();
            gl.bindRenderbuffer(gl.RENDERBUFFER, depthBuffer);
            gl.renderbufferStorage(gl.RENDERBUFFER, gl.DEPTH_COMPONENT16, w, h);
            gl.framebufferRenderbuffer(gl.FRAMEBUFFER, gl.DEPTH_ATTACHMENT, gl.RENDERBUFFER, depthBuffer);
        
            gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        }
    
        // Full Screen Quad VAO (For drawing the Post Process texture)
        const quadVao = gl.createVertexArray();
        gl.bindVertexArray(quadVao);
        const quadVbo = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, quadVbo);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
    
        // ==========================================
        // 5. GEOMETRY & SCENE SETUP
        // ==========================================
        function createSphere(radius, segments) {
            let verts = [], norms =[], inds =[];
            for (let y = 0; y <= segments; y++) {
                for (let x = 0; x <= segments; x++) {
                    let xSeg = x / segments, ySeg = y / segments;
                    let xPos = Math.cos(xSeg * 2 * Math.PI) * Math.sin(ySeg * Math.PI);
                    let yPos = Math.cos(ySeg * Math.PI);
                    let zPos = Math.sin(xSeg * 2 * Math.PI) * Math.sin(ySeg * Math.PI);
                    verts.push(xPos * radius, yPos * radius, zPos * radius);
                    norms.push(xPos, yPos, zPos);
                }
            }
            for (let y = 0; y < segments; y++) {
                for (let x = 0; x < segments; x++) {
                    let first = (y * (segments + 1)) + x;
                    let second = first + segments + 1;
                    inds.push(first, second, first + 1, second, second + 1, first + 1);
                }
            }
            return { verts, norms, inds };
        }
        const sphereData = createSphere(0.8, 32);
    
        const rows = 6, cols = 6; const spacing = 2.0;
        const baseColor =[0.9, 0.1, 0.1]; // Bright Ruby Red
    
        for (let row = 0; row < rows; row++) {
            let roughness = Math.max(0.05, row / (rows - 1));
            for (let col = 0; col < cols; col++) {
                let metallic = col / (cols - 1);
                const e = engine.createEntity();
                let x = (col - (cols / 2)) * spacing + (spacing / 2);
                let y = ((rows / 2) - row) * spacing - (spacing / 2);
                engine.addComponent(e, 'Transform', Transform(x, y, 0));
                engine.addComponent(e, 'Mesh', Mesh(sphereData.verts, sphereData.norms, sphereData.inds));
                engine.addComponent(e, 'Material', Material(baseColor[0], baseColor[1], baseColor[2], metallic, roughness));
            }
        }
    
        // ==========================================
        // 6. PIPELINE EXECUTION
        // ==========================================
        const projMat = Mat4.create(), viewMat = Mat4.create();
        const cameraPos = [0, 0, 15];
    
        function renderSystem(time) {
            // 1. UPDATE TRANSFORMS
            const entities = engine.query('Transform');
            for (let e of entities) {
                const t = engine.getComponent(e, 'Transform');
                Mat4.fromRotationTranslationScale(t.matrix, t.rotation, t.position, t.scale);
            }
        
            // Dynamic orbiting light source
            const lightPos =[Math.sin(time) * 12.0, Math.sin(time*0.5)*5.0 + 5.0, Math.cos(time) * 12.0];
        
            // --- PASS 1: RENDER PBR TO FRAMEBUFFER ---
            gl.bindFramebuffer(gl.FRAMEBUFFER, targetFBO);
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0.02, 0.02, 0.03, 1.0); // Very dark blue void
            gl.enable(gl.DEPTH_TEST);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
        
            gl.useProgram(pbrProgram);
            Mat4.perspective(projMat, Math.PI / 4, canvas.width / canvas.height, 0.1, 100.0);
            Mat4.lookAt(viewMat, cameraPos, [0, 0, 0], [0, 1, 0]);
        
            gl.uniformMatrix4fv(locs.proj, false, projMat);
            gl.uniformMatrix4fv(locs.view, false, viewMat);
            gl.uniform3fv(locs.camPos, cameraPos);
            gl.uniform3fv(locs.lightPos, lightPos);
        
            const renderables = engine.query('Transform', 'Mesh', 'Material');
            for (let e of renderables) {
                const t = engine.getComponent(e, 'Transform');
                const m = engine.getComponent(e, 'Mesh');
                const mat = engine.getComponent(e, 'Material');
            
                if (!m.ready) {
                    m.vao = gl.createVertexArray(); gl.bindVertexArray(m.vao);
                    const pBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, pBuf);
                    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(m.vertices), gl.STATIC_DRAW);
                    gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 0, 0);
                
                    const nBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, nBuf);
                    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(m.normals), gl.STATIC_DRAW);
                    gl.enableVertexAttribArray(1); gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 0, 0);
                
                    const iBuf = gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, iBuf);
                    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(m.indices), gl.STATIC_DRAW);
                    m.ready = true;
                }
                gl.uniformMatrix4fv(locs.model, false, t.matrix);
                gl.uniform3fv(locs.albedo, mat.albedo);
                gl.uniform1f(locs.metallic, mat.metallic);
                gl.uniform1f(locs.roughness, mat.roughness);
                gl.bindVertexArray(m.vao);
                gl.drawElements(gl.TRIANGLES, m.indices.length, gl.UNSIGNED_SHORT, 0);
            }
        
            // --- PASS 2: RENDER POST-PROCESS TO SCREEN ---
            gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.disable(gl.DEPTH_TEST); // No depth test for a 2D quad
        
            gl.useProgram(postProgram);
            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, targetTexture);
            gl.uniform1i(postLocs.screenTex, 0);
            gl.uniform1f(postLocs.time, time);
        
            gl.bindVertexArray(quadVao);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }
    
        // ==========================================
        // 7. GAME LOOP
        // ==========================================
        let lastTime = performance.now();
        let frames = 0, lastFpsUpdate = lastTime;
    
        function loop(now) {
            frames++;
            if (now - lastFpsUpdate > 1000) {
                document.getElementById('fps').innerText = frames;
                frames = 0; lastFpsUpdate = now;
            }
            renderSystem(now * 0.001);
            requestAnimationFrame(loop);
        }
    
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupFBO(canvas.width, canvas.height);
        }
        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
