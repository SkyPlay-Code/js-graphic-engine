<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Graphics Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="screen"></canvas>

    <script>
        // --- INITIALIZATION ---
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        let frameBuffer = ctx.createImageData(width, height);
        let buf32 = new Uint32Array(frameBuffer.data.buffer);
        let zBuffer = new Float32Array(width * height);

        function clearBuffers() {
            buf32.fill(0xFF000000); // Solid Black
            zBuffer.fill(Infinity);
        }

        function rgb(r, g, b) {
            return (255 << 24) | ((b & 255) << 16) | ((g & 255) << 8) | (r & 255);
        }

        // --- VECTOR MATH ENGINE ---
        const sub = (a, b) =>[a[0] - b[0], a[1] - b[1], a[2] - b[2]];
        const dot = (a, b) => a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
        const cross = (a, b) => [
            a[1] * b[2] - a[2] * b[1],
            a[2] * b[0] - a[0] * b[2],
            a[0] * b[1] - a[1] * b[0]
        ];
        const norm = (a) => {
            let len = Math.sqrt(a[0]*a[0] + a[1]*a[1] + a[2]*a[2]);
            return len ? [a[0]/len, a[1]/len, a[2]/len] :[0, 0, 0];
        };

        // --- GOURAUD RASTERIZATION (SMOOTH SHADING) ---
        // Notice it now takes i0, i1, i2 (Lighting Intensity at each corner)
        function fillTriangleGouraud(x0, y0, z0, i0, x1, y1, z1, i1, x2, y2, z2, i2, r, g, b) {
            let minX = Math.max(0, Math.floor(Math.min(x0, x1, x2)));
            let maxX = Math.min(width - 1, Math.ceil(Math.max(x0, x1, x2)));
            let minY = Math.max(0, Math.floor(Math.min(y0, y1, y2)));
            let maxY = Math.min(height - 1, Math.ceil(Math.max(y0, y1, y2)));

            const edge = (ax, ay, bx, by, cx, cy) => (cx - ax) * (by - ay) - (cy - ay) * (bx - ax);
            let area = edge(x0, y0, x1, y1, x2, y2);

            if (area === 0) return;

            for (let y = minY; y <= maxY; y++) {
                for (let x = minX; x <= maxX; x++) {
                    let w0 = edge(x1, y1, x2, y2, x, y);
                    let w1 = edge(x2, y2, x0, y0, x, y);
                    let w2 = edge(x0, y0, x1, y1, x, y);

                    if ((w0 >= 0 && w1 >= 0 && w2 >= 0) || (w0 <= 0 && w1 <= 0 && w2 <= 0)) {
                        // Barycentric weights: How close is the pixel to each corner?
                        let alpha = w0 / area;
                        let beta = w1 / area;
                        let gamma = w2 / area;

                        let pixelZ = z0 * alpha + z1 * beta + z2 * gamma;
                        let index = y * width + x;

                        if (pixelZ < zBuffer[index]) {
                            zBuffer[index] = pixelZ;

                            // SMOOTH SHADING MAGIC: 
                            // Blend the 3 corner intensities smoothly across the surface!
                            let intensity = i0 * alpha + i1 * beta + i2 * gamma;

                            buf32[index] = rgb(r * intensity, g * intensity, b * intensity);
                        }
                    }
                }
            }
        }

        // --- PROCEDURAL GEOMETRY: THE SPHERE ---
        const vertices = [];
        const normals = [];
        const faces =[];
        const latBands = 24; // Latitude resolution
        const lonBands = 24; // Longitude resolution

        // Generate vertices using spherical trigonometry
        for (let lat = 0; lat <= latBands; lat++) {
            let theta = lat * Math.PI / latBands;
            let sinTheta = Math.sin(theta);
            let cosTheta = Math.cos(theta);

            for (let lon = 0; lon <= lonBands; lon++) {
                let phi = lon * 2 * Math.PI / lonBands;
                let sinPhi = Math.sin(phi);
                let cosPhi = Math.cos(phi);

                let x = cosPhi * sinTheta;
                let y = cosTheta;
                let z = sinPhi * sinTheta;

                vertices.push([x, y, z]);

                // For a perfect sphere at (0,0,0), the Normal Vector 
                // is exactly the same as the Vertex Coordinates!
                normals.push([x, y, z]); 
            }
        }

        // Connect the vertices into triangles
        for (let lat = 0; lat < latBands; lat++) {
            for (let lon = 0; lon < lonBands; lon++) {
                let first = (lat * (lonBands + 1)) + lon;
                let second = first + lonBands + 1;
                faces.push([first, second, first + 1]);
                faces.push([second, second + 1, first + 1]);
            }
        }

        // --- CAMERA & INPUT ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let camera = { x: 0, y: 0, z: -10, yaw: 0, pitch: 0 };

        function updateCamera(dt) {
            const moveSpeed = 8 * dt; const turnSpeed = 2 * dt;
            if (keys['KeyW']) { camera.x += Math.sin(camera.yaw) * moveSpeed; camera.z += Math.cos(camera.yaw) * moveSpeed; }
            if (keys['KeyS']) { camera.x -= Math.sin(camera.yaw) * moveSpeed; camera.z -= Math.cos(camera.yaw) * moveSpeed; }
            if (keys['KeyA']) { camera.x -= Math.cos(camera.yaw) * moveSpeed; camera.z += Math.sin(camera.yaw) * moveSpeed; }
            if (keys['KeyD']) { camera.x += Math.cos(camera.yaw) * moveSpeed; camera.z -= Math.sin(camera.yaw) * moveSpeed; }
            if (keys['Space']) camera.y -= moveSpeed;
            if (keys['ShiftLeft']) camera.y += moveSpeed;
            if (keys['ArrowLeft']) camera.yaw -= turnSpeed;
            if (keys['ArrowRight']) camera.yaw += turnSpeed;
            if (keys['ArrowUp']) camera.pitch -= turnSpeed;
            if (keys['ArrowDown']) camera.pitch += turnSpeed;
        }

        // --- 3D MATH ENGINE ---
        function rotate3D(x, y, z, pitch, yaw, roll) {
            let cosX = Math.cos(pitch), sinX = Math.sin(pitch);
            let y1 = y * cosX - z * sinX, z1 = y * sinX + z * cosX;
            let cosY = Math.cos(yaw), sinY = Math.sin(yaw);
            let x2 = x * cosY + z1 * sinY, z2 = -x * sinY + z1 * cosY;
            let cosZ = Math.cos(roll), sinZ = Math.sin(roll);
            let x3 = x2 * cosZ - y1 * sinZ, y3 = x2 * sinZ + y1 * cosZ;
            return [x3, y3, z2];
        }

        function applyCamera(x, y, z) {
            let cx = x - camera.x, cy = y - camera.y, cz = z - camera.z;
            let cosY = Math.cos(-camera.yaw), sinY = Math.sin(-camera.yaw);
            let rx = cx * cosY + cz * sinY, rz = -cx * sinY + cz * cosY;
            let cosX = Math.cos(-camera.pitch), sinX = Math.sin(-camera.pitch);
            let ry = cy * cosX - rz * sinX, fz = cy * sinX + rz * cosX;
            return [rx, ry, fz];
        }

        // --- SCENE SETUP ---
        const scene =[
            { x: -3, y: 0, z: 0, scale: 2.0, color:[220, 20, 60] },  // Ruby Red
            { x: 3, y: 0, z: 0, scale: 2.0, color:[20, 220, 100] }  // Emerald Green
        ];

        // Light pointing down and into the screen
        const lightDir = norm([-1, -1, -1]); 

        // --- RENDER LOOP ---
        let lastTime = 0; let time = 0;

        function draw(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            if (lastTime === 0 || dt > 0.1) dt = 0.016; 
            lastTime = timestamp; time += dt;

            updateCamera(dt);
            clearBuffers();

            const cx = width / 2; const cy = height / 2;
            const fov = Math.min(width, height) * 0.8; 

            for (let obj of scene) {
                const viewVertices = [];
                const vertexIntensities =[]; // Store lighting per vertex!

                // 1. Process all vertices AND their normals
                for (let i = 0; i < vertices.length; i++) {
                    let [x, y, z] = vertices[i];
                    let [nx, ny, nz] = normals[i];

                    // Rotate position and normal
                    let rotP = time * 0.5, rotY = time * 0.8, rotR = time * 0.3;
                    let [lx, ly, lz] = rotate3D(x * obj.scale, y * obj.scale, z * obj.scale, rotP, rotY, rotR);
                    let [worldNx, worldNy, worldNz] = rotate3D(nx, ny, nz, rotP, rotY, rotR);

                    // Apply Camera to Position
                    let [vx, vy, vz] = applyCamera(lx + obj.x, ly + obj.y, lz + obj.z);
                    viewVertices.push([vx, vy, vz]);

                    // Calculate Lighting INTENSITY AT THIS SPECIFIC VERTEX (World Space)
                    let intensity = dot([worldNx, worldNy, worldNz], [-lightDir[0], -lightDir[1], -lightDir[2]]);
                    // Clamp it so shadows aren't pitch black (0.15 Ambient Light)
                    vertexIntensities.push(Math.max(0.15, Math.min(1.0, intensity))); 
                }

                // 2. Draw faces
                for (let i = 0; i < faces.length; i++) {
                    const [v1, v2, v3] = faces[i];
                    let p1 = viewVertices[v1], p2 = viewVertices[v2], p3 = viewVertices[v3];

                    // Near Plane Clipping
                    if (p1[2] < 0.1 || p2[2] < 0.1 || p3[2] < 0.1) continue;

                    // Backface Culling
                    let faceNormal = norm(cross(sub(p2, p1), sub(p3, p1)));
                    if (dot(faceNormal, p1) > 0) continue; 

                    // Projection
                    let x0 = (p1[0] / p1[2]) * fov + cx, y0 = (p1[1] / p1[2]) * fov + cy;
                    let x1 = (p2[0] / p2[2]) * fov + cx, y1 = (p2[1] / p2[2]) * fov + cy;
                    let x2 = (p3[0] / p3[2]) * fov + cx, y2 = (p3[1] / p3[2]) * fov + cy;

                    // Grab the pre-calculated light intensities for the 3 corners
                    let i0 = vertexIntensities[v1];
                    let i1 = vertexIntensities[v2];
                    let i2 = vertexIntensities[v3];

                    // Draw Smooth Triangle
                    fillTriangleGouraud(
                        x0, y0, p1[2], i0, 
                        x1, y1, p2[2], i1, 
                        x2, y2, p3[2], i2, 
                        obj.color[0], obj.color[1], obj.color[2]
                    );
                }
            }

            ctx.putImageData(frameBuffer, 0, 0);

            // UI Text
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; ctx.fillRect(10, 10, 360, 110);
            ctx.fillStyle = "white"; ctx.font = "16px monospace";
            ctx.fillText("STEP 9: GOURAUD (SMOOTH) SHADING", 20, 35);
            ctx.fillText("W/A/S/D     : Move around", 20, 60);
            ctx.fillText("SPACE/SHIFT : Move Up / Down", 20, 80);
            ctx.fillText("ARROWS      : Look around", 20, 100);

            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            frameBuffer = ctx.createImageData(width, height);
            buf32 = new Uint32Array(frameBuffer.data.buffer);
            zBuffer = new Float32Array(width * height);
        });
    </script>
</body>
</html>
