<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Next-Gen JS Engine - PBR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: white; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>ENGINE v2.1: PBR PIPELINE</h2>
        <p>X-Axis (Left to Right) : Metallic 0.0 -> 1.0</p>
        <p>Y-Axis (Top to Bottom) : Roughness 0.1 -> 1.0</p>
        <p>FPS: <span id="fps">0</span></p>
    </div>
    <canvas id="screen"></canvas>

    <script>
        // ==========================================
        // 1. MATH LIBRARY (Added Matrix Inversion)
        // ==========================================
        const Mat4 = {
            create: () => new Float32Array(16).fill(0).map((_, i) => i % 5 === 0 ? 1 : 0),
            perspective: (out, fovy, aspect, near, far) => {
                let f = 1.0 / Math.tan(fovy / 2), nf = 1 / (near - far);
                out.fill(0); out[0] = f / aspect; out[5] = f;
                out[10] = (far + near) * nf; out[11] = -1; out[14] = (2 * far * near) * nf;
                return out;
            },
            ortho: (out, left, right, bottom, top, near, far) => {
                let lr = 1 / (left - right), bt = 1 / (bottom - top), nf = 1 / (near - far);
                out.fill(0); out[0] = -2 * lr; out[5] = -2 * bt; out[10] = 2 * nf;
                out[12] = (left + right) * lr; out[13] = (top + bottom) * bt; out[14] = (far + near) * nf; out[15] = 1;
                return out;
            },
            lookAt: (out, eye, center, up) => {
                let z0 = eye[0]-center[0], z1 = eye[1]-center[1], z2 = eye[2]-center[2];
                let len = 1 / Math.hypot(z0, z1, z2); z0 *= len; z1 *= len; z2 *= len;
                let x0 = up[1]*z2 - up[2]*z1, x1 = up[2]*z0 - up[0]*z2, x2 = up[0]*z1 - up[1]*z0;
                len = 1 / Math.hypot(x0, x1, x2); x0 *= len; x1 *= len; x2 *= len;
                let y0 = z1*x2 - z2*x1, y1 = z2*x0 - z0*x2, y2 = z0*x1 - z1*x0;
                out[0] = x0; out[1] = y0; out[2] = z0; out[3] = 0;
                out[4] = x1; out[5] = y1; out[6] = z1; out[7] = 0;
                out[8] = x2; out[9] = y2; out[10] = z2; out[11] = 0;
                out[12] = -(x0*eye[0] + x1*eye[1] + x2*eye[2]);
                out[13] = -(y0*eye[0] + y1*eye[1] + y2*eye[2]);
                out[14] = -(z0*eye[0] + z1*eye[1] + z2*eye[2]); out[15] = 1;
                return out;
            },
            multiply: (out, a, b) => {
                for(let i=0; i<4; i++) {
                    for(let j=0; j<4; j++) out[i*4+j] = a[i*4+0]*b[0+j] + a[i*4+1]*b[4+j] + a[i*4+2]*b[8+j] + a[i*4+3]*b[12+j];
                } return out;
            },
            invert: (out, a) => {
                let a00=a[0],a01=a[1],a02=a[2],a03=a[3],a10=a[4],a11=a[5],a12=a[6],a13=a[7],a20=a[8],a21=a[9],a22=a[10],a23=a[11],a30=a[12],a31=a[13],a32=a[14],a33=a[15];
                let b00=a00*a11-a01*a10,b01=a00*a12-a02*a10,b02=a00*a13-a03*a10,b03=a01*a12-a02*a11,b04=a01*a13-a03*a11,b05=a02*a13-a03*a12,b06=a20*a31-a21*a30,b07=a20*a32-a22*a30,b08=a20*a33-a23*a30,b09=a21*a32-a22*a31,b10=a21*a33-a23*a31,b11=a22*a33-a23*a32;
                let det=b00*b11-b01*b10+b02*b09+b03*b08-b04*b07+b05*b06; if(!det) return null; det=1.0/det;
                out[0]=(a11*b11-a12*b10+a13*b09)*det; out[1]=(a02*b10-a01*b11-a03*b09)*det; out[2]=(a31*b05-a32*b04+a33*b03)*det; out[3]=(a22*b04-a21*b05-a23*b03)*det;
                out[4]=(a12*b08-a10*b11-a13*b07)*det; out[5]=(a00*b11-a02*b08+a03*b07)*det; out[6]=(a32*b02-a30*b05-a33*b01)*det; out[7]=(a20*b05-a22*b02+a23*b01)*det;
                out[8]=(a10*b10-a11*b08+a13*b06)*det; out[9]=(a01*b08-a00*b10-a03*b06)*det; out[10]=(a30*b04-a31*b02+a33*b00)*det; out[11]=(a21*b02-a20*b04-a23*b00)*det;
                out[12]=(a11*b07-a10*b09-a12*b06)*det; out[13]=(a00*b09-a01*b07+a02*b06)*det; out[14]=(a31*b01-a30*b03-a32*b00)*det; out[15]=(a20*b03-a21*b01+a22*b00)*det;
                return out;
            },
            fromRotationTranslationScale: (out, q, v, s) => {
                let x2=q[0]+q[0],y2=q[1]+q[1],z2=q[2]+q[2],xx=q[0]*x2,xy=q[0]*y2,xz=q[0]*z2,yy=q[1]*y2,yz=q[1]*z2,zz=q[2]*z2,wx=q[3]*x2,wy=q[3]*y2,wz=q[3]*z2;
                out[0]=(1-(yy+zz))*s[0]; out[1]=(xy+wz)*s[0]; out[2]=(xz-wy)*s[0]; out[3]=0; out[4]=(xy-wz)*s[1]; out[5]=(1-(xx+zz))*s[1]; out[6]=(yz+wx)*s[1]; out[7]=0;
                out[8]=(xz+wy)*s[2]; out[9]=(yz-wx)*s[2]; out[10]=(1-(xx+yy))*s[2]; out[11]=0; out[12]=v[0]; out[13]=v[1]; out[14]=v[2]; out[15]=1; return out;
            }
        };
        
        // ==========================================
        // 2. ECS CORE
        // ==========================================
        class World {
            constructor() { this.entities = 0; this.components = {}; }
            createEntity() { return ++this.entities; }
            addComponent(e, n, d) { if (!this.components[n]) this.components[n] = {}; this.components[n][e] = d; }
            getComponent(e, n) { return this.components[n] ? this.components[n][e] : null; }
            query(...n) {
                if (!this.components[n[0]]) return[]; let m = Object.keys(this.components[n[0]]);
                for (let i = 1; i < n.length; i++) m = m.filter(e => this.components[n[i]] && this.components[n[i]][e] !== undefined);
                return m;
            }
        }
        const engine = new World();
        function Transform(x=0, y=0, z=0) { return { position:[x, y, z], rotation:[0, 0, 0, 1], scale:[1, 1, 1], matrix: Mat4.create() }; }
        function Asteroid(orbitSpeed, spinAxis, spinSpeed) { return { orbitSpeed, spinAxis, spinSpeed }; }
        function Material(r, g, b, metallic, roughness) { return { albedo:[r, g, b], metallic, roughness }; }
        
        // ==========================================
        // 3. SHADERS
        // ==========================================
        const canvas = document.getElementById('screen');
        const gl = canvas.getContext('webgl2', { antialias: false });
        const extFloat = gl.getExtension("EXT_color_buffer_float");
        
        const vsDepth = `#version 300 es\n layout(location=0) in vec3 a_position; layout(location=2) in mat4 a_instanceMatrix; uniform mat4 u_lightSpaceMatrix; void main(){ gl_Position=u_lightSpaceMatrix*a_instanceMatrix*vec4(a_position,1.0); }`;
        const fsDepth = `#version 300 es\n void main(){}`;
        
        // --- NEW: PROCEDURAL ATMOSPHERE SHADER ---
        const vsSky = `#version 300 es
            layout(location=0) in vec2 a_pos;
            uniform mat4 u_invViewProj;
            out vec3 v_rayDir;
            void main() {
                gl_Position = vec4(a_pos, 1.0, 1.0); // Z=1.0 pushes to the far clipping plane
                vec4 target = u_invViewProj * vec4(a_pos, 1.0, 1.0);
                v_rayDir = target.xyz / target.w; 
            }`;
        
        const fsSky = `#version 300 es
            precision highp float;
            in vec3 v_rayDir;
            uniform vec3 u_lightDir; uniform vec3 u_camPos;
            out vec4 outColor;
            
            void main() {
                vec3 ray = normalize(v_rayDir - u_camPos);
                vec3 sunDir = normalize(-u_lightDir); 
                
                float cosTheta = dot(ray, sunDir);
                float zenith = max(0.0, ray.y);
                float sunZenith = max(0.0, sunDir.y);
                
                // Rayleigh Scattering (Blue Sky)
                vec3 skyColor = mix(vec3(0.1, 0.4, 0.8), vec3(0.02, 0.05, 0.1), zenith);
                
                // Mie Scattering (Sunset Orange/Red)
                vec3 sunset = vec3(1.0, 0.4, 0.1) * pow(max(0.0, 1.0 - sunZenith), 2.0);
                skyColor = mix(skyColor, sunset, max(0.0, 1.0 - zenith) * max(0.0, cosTheta));
                
                // Sun Halo and Disk
                float sunHalo = pow(max(0.0, cosTheta), 256.0) * 0.6 + pow(max(0.0, cosTheta), 8.0) * 0.1;
                vec3 sunColor = vec3(1.0, 0.9, 0.8) * 15.0; // Very bright HDR sun
                
                // Blend everything based on Time of Day (Sun Zenith)
                vec3 finalColor = skyColor * (0.1 + max(0.0, sunZenith) * 0.9) + sunHalo * sunColor;
                
                // Fade to black space when sun drops below horizon
                finalColor *= smoothstep(-0.1, 0.1, sunDir.y); 
        
                outColor = vec4(finalColor, 1.0);
            }`;
        
        const vsPbr = `#version 300 es
            layout(location=0) in vec3 a_position; layout(location=1) in vec3 a_normal;
            layout(location=2) in mat4 a_instanceMatrix; layout(location=6) in vec3 a_instanceAlbedo;
            uniform mat4 u_view; uniform mat4 u_projection; uniform mat4 u_lightSpaceMatrix;
            out vec3 v_worldPos; out vec3 v_normal; out vec3 v_albedo; out vec4 v_fragPosLightSpace;
            void main() {
                vec4 worldPos = a_instanceMatrix * vec4(a_position, 1.0);
                v_worldPos = worldPos.xyz; v_normal = mat3(a_instanceMatrix) * a_normal; v_albedo = a_instanceAlbedo;
                v_fragPosLightSpace = u_lightSpaceMatrix * worldPos; gl_Position = u_projection * u_view * worldPos;
            }`;
        
        const fsPbr = `#version 300 es
            precision highp float;
            in vec3 v_worldPos; in vec3 v_normal; in vec3 v_albedo; in vec4 v_fragPosLightSpace;
            out vec4 outColor;
            
            uniform vec3 u_camPos; uniform vec3 u_lightDir; uniform sampler2D u_shadowMap;
            const float PI = 3.14159265359;
            
            float DistributionGGX(vec3 N, vec3 H, float r) { float a2=r*r*r*r; float NdotH=max(dot(N,H),0.0); float d=(NdotH*NdotH*(a2-1.0)+1.0); return a2/max(PI*d*d,0.0000001); }
            float GeometrySchlickGGX(float NdotV, float r) { float k=((r+1.0)*(r+1.0))/8.0; return NdotV/(NdotV*(1.0-k)+k); }
            float GeometrySmith(vec3 N, vec3 V, vec3 L, float r) { return GeometrySchlickGGX(max(dot(N,L),0.0),r)*GeometrySchlickGGX(max(dot(N,V),0.0),r); }
            vec3 fresnelSchlick(float cosT, vec3 F0) { return F0+(1.0-F0)*pow(clamp(1.0-cosT,0.0,1.0),5.0); }
        
            float ShadowCalculation(vec4 fragPosLightSpace, vec3 N, vec3 L) {
                vec3 projCoords = fragPosLightSpace.xyz / fragPosLightSpace.w; projCoords = projCoords * 0.5 + 0.5;
                if(projCoords.z > 1.0) return 0.0;
                float currentDepth = projCoords.z; float bias = max(0.005 * (1.0 - dot(N, L)), 0.0005);
                float shadow = 0.0; vec2 texelSize = 1.0 / vec2(2048.0);
                for(int x=-1; x<=1; ++x) { for(int y=-1; y<=1; ++y) {
                    float pcfDepth = texture(u_shadowMap, projCoords.xy + vec2(x,y)*texelSize).r; 
                    shadow += currentDepth - bias > pcfDepth ? 1.0 : 0.0;        
                }} return shadow / 9.0;
            }
            
            void main() {
                float u_metallic=0.05, u_roughness=0.85; 
                vec3 N=normalize(v_normal), V=normalize(u_camPos-v_worldPos), L=normalize(-u_lightDir), H=normalize(V+L);
                vec3 F0=mix(vec3(0.04), v_albedo, u_metallic);
                
                // Dynamically adjust light intensity based on time of day (Sun height)
                float sunPower = max(0.0, dot(vec3(0.0, 1.0, 0.0), L));
                vec3 radiance = vec3(2.5, 2.4, 2.2) * smoothstep(0.0, 0.2, sunPower); 
                
                float NDF=DistributionGGX(N,H,u_roughness), G=GeometrySmith(N,V,L,u_roughness);      
                vec3 F=fresnelSchlick(max(dot(H,V),0.0),F0);       
                vec3 specular=(NDF*G*F)/max(4.0*max(dot(N,V),0.0)*max(dot(N,L),0.0),0.001);
                vec3 kD=(vec3(1.0)-F)*(1.0-u_metallic);	  
                vec3 Lo=(kD*v_albedo/PI+specular)*radiance*max(dot(N,L),0.0);
                
                float shadow = ShadowCalculation(v_fragPosLightSpace, N, L);
                
                // Dynamic Sky Ambient Light (blueish during day, black at night)
                vec3 ambient = vec3(0.05, 0.1, 0.2) * v_albedo * max(0.05, sunPower);
                
                outColor = vec4(ambient + (1.0 - shadow) * Lo, 1.0);
            }`;
        
        const vsPost = `#version 300 es\nlayout(location=0) in vec2 a_pos; out vec2 v_texCoord; void main(){ gl_Position=vec4(a_pos,0.0,1.0); v_texCoord=a_pos*0.5+0.5; }`;
        const fsPost = `#version 300 es
            precision highp float; in vec2 v_texCoord; uniform sampler2D u_tex; out vec4 color;
            vec3 ACES(vec3 x) { return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14), 0.0, 1.0); }
            void main() {
                vec3 c = texture(u_tex, v_texCoord).rgb;
                c = pow(ACES(c), vec3(1.0/2.2));
                color = vec4(c * (1.0 - dot(v_texCoord*2.-1., v_texCoord*2.-1.)*0.2), 1.0);
            }`;
        
        function compile(t, s) { const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); return sh; }
        const depthProg = gl.createProgram(); gl.attachShader(depthProg, compile(gl.VERTEX_SHADER, vsDepth)); gl.attachShader(depthProg, compile(gl.FRAGMENT_SHADER, fsDepth)); gl.linkProgram(depthProg);
        const skyProg = gl.createProgram(); gl.attachShader(skyProg, compile(gl.VERTEX_SHADER, vsSky)); gl.attachShader(skyProg, compile(gl.FRAGMENT_SHADER, fsSky)); gl.linkProgram(skyProg);
        const pbrProg = gl.createProgram(); gl.attachShader(pbrProg, compile(gl.VERTEX_SHADER, vsPbr)); gl.attachShader(pbrProg, compile(gl.FRAGMENT_SHADER, fsPbr)); gl.linkProgram(pbrProg);
        const postProg = gl.createProgram(); gl.attachShader(postProg, compile(gl.VERTEX_SHADER, vsPost)); gl.attachShader(postProg, compile(gl.FRAGMENT_SHADER, fsPost)); gl.linkProgram(postProg);
        
        const pbrLocs = { view: gl.getUniformLocation(pbrProg,"u_view"), proj: gl.getUniformLocation(pbrProg,"u_projection"), camPos: gl.getUniformLocation(pbrProg,"u_camPos"), lightDir: gl.getUniformLocation(pbrProg,"u_lightDir"), lightSpaceMat: gl.getUniformLocation(pbrProg,"u_lightSpaceMatrix"), shadowMap: gl.getUniformLocation(pbrProg,"u_shadowMap") };
        const depthLocs = { lightSpaceMat: gl.getUniformLocation(depthProg,"u_lightSpaceMatrix") };
        const skyLocs = { invVP: gl.getUniformLocation(skyProg,"u_invViewProj"), camPos: gl.getUniformLocation(skyProg,"u_camPos"), lightDir: gl.getUniformLocation(skyProg,"u_lightDir") };
        
        // ==========================================
        // 4. FBOS & BUFFERS
        // ==========================================
        const SHADOW_RES = 2048;
        const shadowFBO = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, shadowFBO);
        const shadowTex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, shadowTex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.DEPTH_COMPONENT24, SHADOW_RES, SHADOW_RES, 0, gl.DEPTH_COMPONENT, gl.UNSIGNED_INT, null);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.DEPTH_ATTACHMENT, gl.TEXTURE_2D, shadowTex, 0);
        
        let targetFBO, targetTex, depthBuf;
        function setupFBO(w, h) {
            if(targetFBO) { gl.deleteFramebuffer(targetFBO); gl.deleteTexture(targetTex); gl.deleteRenderbuffer(depthBuf); }
            targetFBO = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, targetFBO);
            targetTex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, targetTex);
            gl.texImage2D(gl.TEXTURE_2D, 0, extFloat ? gl.RGBA16F : gl.RGBA8, w, h, 0, gl.RGBA, extFloat ? gl.HALF_FLOAT : gl.UNSIGNED_BYTE, null);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, targetTex, 0);
            depthBuf = gl.createRenderbuffer(); gl.bindRenderbuffer(gl.RENDERBUFFER, depthBuf);
            gl.renderbufferStorage(gl.RENDERBUFFER, gl.DEPTH_COMPONENT24, w, h);
            gl.framebufferRenderbuffer(gl.FRAMEBUFFER, gl.DEPTH_ATTACHMENT, gl.RENDERBUFFER, depthBuf);
            gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        }
        
        const quadVao = gl.createVertexArray(); gl.bindVertexArray(quadVao);
        const quadVbo = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, quadVbo);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
        
        // ==========================================
        // 5. GEOMETRY & INSTANCING
        // ==========================================
        function createAsteroid() {
            let t=(1.0+Math.sqrt(5.0))/2.0, v=[-1,t,0, 1,t,0, -1,-t,0, 1,-t,0, 0,-1,t, 0,1,t, 0,-1,-t, 0,1,-t, t,0,-1, t,0,1, -t,0,-1, -t,0,1];
            let i=[0,11,5,0,5,1,0,1,7,0,7,10,0,10,11,1,5,9,5,11,4,11,10,2,10,7,6,7,1,8,3,9,4,3,4,2,3,2,6,3,6,8,3,8,9,4,9,5,2,4,11,6,2,10,8,6,7,9,8,1];
            let verts=[], norms=[];
            for(let j=0; j<i.length; j+=3) {
                let p1=[v[i[j]*3],v[i[j]*3+1],v[i[j]*3+2]], p2=[v[i[j+1]*3],v[i[j+1]*3+1],v[i[j+1]*3+2]], p3=[v[i[j+2]*3],v[i[j+2]*3+1],v[i[j+2]*3+2]];
                let ux=p2[0]-p1[0],uy=p2[1]-p1[1],uz=p2[2]-p1[2], vx=p3[0]-p1[0],vy=p3[1]-p1[1],vz=p3[2]-p1[2];
                let nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx, l=Math.hypot(nx,ny,nz); nx/=l; ny/=l; nz/=l;
                verts.push(...p1,...p2,...p3); norms.push(nx,ny,nz,nx,ny,nz,nx,ny,nz);
            } return { verts: new Float32Array(verts), norms: new Float32Array(norms) };
        }
        const astData = createAsteroid();
        const INSTANCE_COUNT = 15000;
        const matrixData = new Float32Array(INSTANCE_COUNT * 16), colorData = new Float32Array(INSTANCE_COUNT * 3);
        
        const instVao = gl.createVertexArray(); gl.bindVertexArray(instVao);
        const vBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vBuf); gl.bufferData(gl.ARRAY_BUFFER, astData.verts, gl.STATIC_DRAW);
        gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 0, 0);
        const nBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, nBuf); gl.bufferData(gl.ARRAY_BUFFER, astData.norms, gl.STATIC_DRAW);
        gl.enableVertexAttribArray(1); gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 0, 0);
        
        const matBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, matBuf); gl.bufferData(gl.ARRAY_BUFFER, matrixData.byteLength, gl.DYNAMIC_DRAW);
        for (let i = 0; i < 4; i++) { gl.enableVertexAttribArray(2+i); gl.vertexAttribPointer(2+i, 4, gl.FLOAT, false, 64, i*16); gl.vertexAttribDivisor(2+i, 1); }
        const colBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, colBuf); gl.bufferData(gl.ARRAY_BUFFER, colorData.byteLength, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(6); gl.vertexAttribPointer(6, 3, gl.FLOAT, false, 12, 0); gl.vertexAttribDivisor(6, 1);
        
        // ==========================================
        // 6. SCENE & CAMERA SETUP
        // ==========================================
        const planet = engine.createEntity();
        engine.addComponent(planet, 'Transform', Transform(0, 0, 0)); engine.getComponent(planet, 'Transform').scale =[15.0, 15.0, 15.0];
        engine.addComponent(planet, 'Asteroid', Asteroid(0,[0,1,0], 0.1)); engine.addComponent(planet, 'Material', Material(0.2, 0.4, 0.8, 0.1, 0.9));
        
        for (let i = 1; i < INSTANCE_COUNT; i++) {
            const e = engine.createEntity();
            let r = 25 + Math.random()*60, a = Math.random()*Math.PI*2, y = (Math.random()-0.5)*8.0, s = 0.2 + Math.random()*1.5, c = 0.4 + Math.random()*0.4;
            engine.addComponent(e, 'Transform', Transform(Math.cos(a)*r, y, Math.sin(a)*r)); engine.getComponent(e, 'Transform').scale =[s,s,s];
            engine.addComponent(e, 'Material', Material(c+0.1, c, c-0.1, 0.1, 0.9));
            engine.addComponent(e, 'Asteroid', Asteroid((1.0/r)*(Math.random()>0.5?1:-1),[Math.random(),Math.random(),Math.random()], Math.random()*2.0));
        }
        
        let camRadius = 80, camTheta = 0, camPhi = 1.0, isDragging = false, lastX = 0, lastY = 0;
        window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if(!isDragging) return; camTheta -= (e.clientX - lastX) * 0.005; camPhi += (e.clientY - lastY) * 0.005;
            camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi)); lastX = e.clientX; lastY = e.clientY;
        });
        window.addEventListener('wheel', e => { camRadius += e.deltaY * 0.05; camRadius = Math.max(20, Math.min(200, camRadius)); });
        
        // ==========================================
        // 7. RENDER LOOP
        // ==========================================
        const projMat = Mat4.create(), viewMat = Mat4.create(), viewProjMat = Mat4.create(), invViewProj = Mat4.create();
        const lightProj = Mat4.create(), lightView = Mat4.create(), lightSpaceMat = Mat4.create();
        
        function renderSystem(time, dt) {
            let entities = engine.query('Transform', 'Asteroid', 'Material'); let idx = 0;
            for (let e of entities) {
                let t = engine.getComponent(e, 'Transform'), ast = engine.getComponent(e, 'Asteroid'), mat = engine.getComponent(e, 'Material');
                if (idx !== 0) {
                    let currentAngle = Math.atan2(t.position[2], t.position[0]) + (ast.orbitSpeed * dt), dist = Math.hypot(t.position[0], t.position[2]);
                    t.position[0] = Math.cos(currentAngle) * dist; t.position[2] = Math.sin(currentAngle) * dist;
                }
                let halfAngle = (time * ast.spinSpeed) * 0.5, s = Math.sin(halfAngle);
                t.rotation[0]=ast.spinAxis[0]*s; t.rotation[1]=ast.spinAxis[1]*s; t.rotation[2]=ast.spinAxis[2]*s; t.rotation[3]=Math.cos(halfAngle);
                Mat4.fromRotationTranslationScale(t.matrix, t.rotation, t.position, t.scale);
                matrixData.set(t.matrix, idx * 16); colorData.set(mat.albedo, idx * 3); idx++;
            }
            gl.bindBuffer(gl.ARRAY_BUFFER, matBuf); gl.bufferSubData(gl.ARRAY_BUFFER, 0, matrixData);
            gl.bindBuffer(gl.ARRAY_BUFFER, colBuf); gl.bufferSubData(gl.ARRAY_BUFFER, 0, colorData);
        
            // Day/Night Cycle (Sun completes an orbit every 30 seconds)
            const sunAngle = time * 0.2;
            // Y-axis orbit simulates a sunrise -> high noon -> sunset -> night
            const lightDir =[-Math.cos(sunAngle), -Math.sin(sunAngle), 0.0]; 
            const lightPos =[lightDir[0]* -100.0, lightDir[1]* -100.0, lightDir[2]* -100.0];
            
            Mat4.ortho(lightProj, -90, 90, -90, 90, 1.0, 200.0);
            Mat4.lookAt(lightView, lightPos, [0, 0, 0],[0, 1, 0]);
            Mat4.multiply(lightSpaceMat, lightProj, lightView);
        
            // PASS 1: SHADOW MAP
            gl.bindFramebuffer(gl.FRAMEBUFFER, shadowFBO);
            gl.viewport(0, 0, SHADOW_RES, SHADOW_RES);
            gl.enable(gl.DEPTH_TEST); gl.clear(gl.DEPTH_BUFFER_BIT);
            gl.useProgram(depthProg);
            gl.uniformMatrix4fv(depthLocs.lightSpaceMat, false, lightSpaceMat);
            gl.bindVertexArray(instVao);
            gl.drawArraysInstanced(gl.TRIANGLES, 0, astData.verts.length / 3, INSTANCE_COUNT);
        
            // PASS 2: BEAUTY PASS
            gl.bindFramebuffer(gl.FRAMEBUFFER, targetFBO);
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
        
            let cx = Math.sin(camPhi)*Math.cos(camTheta)*camRadius, cy = Math.cos(camPhi)*camRadius, cz = Math.sin(camPhi)*Math.sin(camTheta)*camRadius;
            Mat4.perspective(projMat, Math.PI / 4, canvas.width / canvas.height, 0.1, 300.0);
            Mat4.lookAt(viewMat, [cx, cy, cz],[0, 0, 0],[0, 1, 0]);
            Mat4.multiply(viewProjMat, projMat, viewMat);
            Mat4.invert(invViewProj, viewProjMat);
        
            // 2A: RENDER SKY (Backdrop)
            gl.disable(gl.DEPTH_TEST);
            gl.useProgram(skyProg);
            gl.uniformMatrix4fv(skyLocs.invVP, false, invViewProj);
            gl.uniform3fv(skyLocs.camPos, [cx, cy, cz]);
            gl.uniform3fv(skyLocs.lightDir, lightDir);
            gl.bindVertexArray(quadVao);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        
            // 2B: RENDER ASTEROIDS (Foreground)
            gl.enable(gl.DEPTH_TEST);
            gl.useProgram(pbrProg);
            gl.uniformMatrix4fv(pbrLocs.proj, false, projMat);
            gl.uniformMatrix4fv(pbrLocs.view, false, viewMat);
            gl.uniformMatrix4fv(pbrLocs.lightSpaceMat, false, lightSpaceMat);
            gl.uniform3fv(pbrLocs.camPos, [cx, cy, cz]);
            gl.uniform3fv(pbrLocs.lightDir, lightDir);
            gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, shadowTex);
            gl.uniform1i(pbrLocs.shadowMap, 0);
            gl.bindVertexArray(instVao);
            gl.drawArraysInstanced(gl.TRIANGLES, 0, astData.verts.length / 3, INSTANCE_COUNT);
        
            // PASS 3: POST PROCESS
            gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            gl.disable(gl.DEPTH_TEST);
            gl.useProgram(postProg);
            gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, targetTex);
            gl.bindVertexArray(quadVao);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }
        
        // ==========================================
        // 8. BOOTSTRAP
        // ==========================================
        let lastTime = performance.now(), frames = 0, lastFpsUpdate = lastTime;
        function loop(now) {
            let dt = (now - lastTime) / 1000.0; if(dt > 0.1) dt = 0.016;
            frames++; if (now - lastFpsUpdate > 1000) { document.title = `JS Engine | FPS: ${frames} | Objects: 15k | Sky Atmosphere`; frames = 0; lastFpsUpdate = now; }
            renderSystem(now * 0.001, dt); lastTime = now; requestAnimationFrame(loop);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; setupFBO(canvas.width, canvas.height); });
        window.dispatchEvent(new Event('resize'));
        requestAnimationFrame(loop);
    </script>
</body>
