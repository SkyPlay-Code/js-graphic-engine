<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Graphics Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="screen"></canvas>

    <script>
        // --- INITIALIZATION ---
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');

        // Set canvas to full screen
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // --- THE FRAMEBUFFER ---
        // We need direct access to pixel data. 
        // Create an ImageData object. This is our "Video Memory".
        let frameBuffer = ctx.createImageData(width, height);
        
        // The data is a generic array (Uint8ClampedArray).
        // Format: [R, G, B, A, R, G, B, A, ...]
        let data = frameBuffer.data;

        // --- LOW LEVEL FUNCTIONS ---

        // Function to set a specific pixel's color
        // This is the atom of our graphics engine.
        function putPixel(x, y, r, g, b, a = 255) {
            // Check bounds to prevent errors
            if (x < 0 || x >= width || y < 0 || y >= height) return;

            // Calculate the index in the 1D array
            // (y * width + x) gives the pixel index
            // * 4 because each pixel has 4 bytes (RGBA)
            const index = (Math.floor(y) * width + Math.floor(x)) * 4;

            data[index]     = r; // Red
            data[index + 1] = g; // Green
            data[index + 2] = b; // Blue
            data[index + 3] = a; // Alpha
        }

        // Function to clear the screen (fill with black)
        function clearScreen() {
            // A fast way to clear the array is to fill it with 0 (transparent black)
            // or 255 (opaque white), but manual loop gives us control.
            // For now, let's just use the built-in fill for speed on clear.
            data.fill(0); 
            
            // Note: Since fill(0) sets Alpha to 0, pixels become transparent.
            // For a solid black background, we actually need Alpha to be 255.
            // We will handle background clearing more smartly in the next step.
        }

        // --- THE RENDER LOOP ---
        function draw() {
            // 1. Clear the buffer (optional for static noise, but good habit)
            // clearScreen(); 

            // 2. Draw something (Test: Static Noise)
            // We'll draw 10,000 random pixels per frame to test performance
            for (let i = 0; i < 10000; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const r = Math.random() * 255;
                const g = Math.random() * 255;
                const b = Math.random() * 255;
                
                putPixel(x, y, r, g, b);
            }

            // 3. Push the buffer to the canvas
            ctx.putImageData(frameBuffer, 0, 0);

            // 4. Request next frame
            requestAnimationFrame(draw);
        }

        // Start the engine
        draw();

        // Handle window resize
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            frameBuffer = ctx.createImageData(width, height);
            data = frameBuffer.data;
        });

    </script>
</body>
</html>
